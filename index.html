<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Mesto Project</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <link rel="stylesheet" href="pages/index.css">
  <meta name="theme-color" content="#2a2c2d">
</head>
<body class="page">
<header class="header">
    <div class="header__logo"></div>
</header>
<main class="content">
  <section class="profile">
    <img class="profile__avatar" src="images/profile-avatar.png" alt="Avatar">
    <div class="profile__info">
      <p class="profile__name">Жак-Ив Кусто</p>
      <button class="profile__edit-profile" id="profileEditButton" type="button"></button>
      <p class="profile__description">Исследователь океана</p>
    </div>
    <button class="profile__add-button" type="button">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="profile__add-button-icon" fill="none"
              d="M22 9.77778H12.2222V0H9.77778V9.77778H0V12.2222H9.77778V22H12.2222V12.2222H22V9.77778Z"/>
      </svg>
    </button>
  </section>
  <section class="cards">
    <div class="card">
      <img class="card__image" src="images/card-image-1.png" alt="Карточка">
      <div class="card__description">
        <h2 class="card__title">Карачаевск</h2>
        <label class="card__like-label">
          <input class="card__like-checkbox" type="checkbox">
          <span class="card__like"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Гора Эльбрус</h2>
        <label class="card__like-label">
          <input class="card__like-checkbox" type="checkbox">
          <span class="card__like"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image-3.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Домбай</h2>
          <label class="card__like-label">
            <input class="card__like-checkbox" type="checkbox">
            <span class="card__like"></span>
          </label>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Гора Эльбрус</h2>
        <label class="card__like-label">
          <input class="card__like-checkbox" type="checkbox">
          <span class="card__like"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image-3.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Домбай</h2>
        <label class="card__like-label">
          <input class="card__like-checkbox" type="checkbox">
          <span class="card__like"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image-1.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Карачаево-черкесия</h2>
        <label class="card__like-label">
          <input class="card__like-checkbox" type="checkbox">
          <span class="card__like"></span>
        </label>
      </div>
    </div>
  </section>
</main>
<footer class="footer">
  <p class="footer__copyright">© 2020 Mesto Russia</p>
</footer>

<!-- Модальное окно редактирования профиля -->
<div class="profile-edit-modal">
  <form action="#" class="profile-edit-modal__form">
    <span class="profile-edit-modal__close">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M20 18L12 10L20 2L18 0L10 8L2 0L0 2L8 10L0 18L2 20L10 12L18 20L20 18Z" fill="white"/>
</svg>
    </span>
    <h2 class="profile-edit-modal__title">Редактировать профиль</h2>
    <label>
      <input type="text" class="profile-edit-modal__input" value="Жак-Ив Кусто">
    </label>
    <label>
      <input type="text" class="profile-edit-modal__input" value="Исследователь океана">
    </label>
    <button type="submit" class="profile-edit-modal__submit">Сохранить</button>
  </form>
</div>

<script type="module" src="pages/index.js"></script>
</body>
</html>
