<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Mesto Project</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <link rel="stylesheet" href="pages/index.css">
</head>
<body class="page">
<header class="header">
  <div class="header__logo"></div>
</header>
<main class="content">
  <section class="profile">
    <img class="profile__avatar" src="images/profile-avatar.png" alt="Avatar">
    <div class="profile__info">
      <h1 class="profile__name">Жак-Ив Кусто</h1>
      <button class="profile__edit-button" id="profileEditButton" type="button"></button>
      <p class="profile__description">Исследователь океана</p>
    </div>
    <button class="profile__add-button" type="button"></button>
  </section>
  <section class="cards">
  </section>
</main>
<footer class="footer">
  <p class="footer__copyright">© 2020 Mesto Russia</p>
</footer>

<!-- Модальное окно редактирования профиля -->
<div id="profileEdit" class="popup">
  <div class="popup__container">
    <form class="popup__form" action="#">
      <h2 class="popup__title">Редактировать профиль</h2>
      <input type="text" class="popup__input" value="Жак-Ив Кусто" name="name">
      <input type="text" class="popup__input" value="Исследователь океана" name="description">
      <button type="submit" class="popup__submit">Сохранить</button>
    </form>
    <button class="popup__close" type="button" aria-label="Закрыть"></button>
  </div>
</div>

<!-- Модальное окно добавления карточки -->
<div id="newCard" class="popup">
  <div class="popup__container">
    <form class="popup__form" action="#">
      <h2 class="popup__title">Новое место</h2>
      <input type="text" class="popup__input" placeholder="Название" name="title">
      <input type="text" class="popup__input" placeholder="Ссылка на картинку" name="link">
      <button type="submit" class="popup__submit">Сохранить</button>
    </form>
    <button class="popup__close" type="button" aria-label="Закрыть"></button>
  </div>
</div>
<template id="card-template">
  <div class="card">
    <button class="card__delete-button"></button>
    <img class="card__image">
    <div class="card__description">
      <h5 class="card__title"></h5>
      <button class="card__like"></button>
    </div>
  </div>
</template>
<script type="module" src="pages/index.js"></script>
</body>
</html>
