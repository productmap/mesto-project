<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Mesto Project</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <link rel="stylesheet" href="pages/index.css">
</head>
<body class="page">
<header class="header">
  <div class="header__logo"></div>
</header>
<main class="content">
  <section class="profile">
    <img class="profile__avatar" src="images/profile-avatar.png" alt="Avatar">
    <div class="profile__info">
      <h1 class="profile__name">Жак-Ив Кусто</h1>
      <button class="profile__edit-profile" id="profileEditButton" type="button"></button>
      <p class="profile__description">Исследователь океана</p>
    </div>
    <button class="profile__add-button" type="button"></button>
  </section>
  <section class="cards">
    <div class="card">
      <img class="card__image" src="images/card-image-1.png" alt="Карточка">
      <div class="card__description">
        <h2 class="card__title">Карачаевск</h2>
        <button class="card__like" type="button"></button>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Гора Эльбрус</h2>
        <button class="card__like" type="button"></button>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image-3.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Домбай</h2>
        <button class="card__like" type="button"></button>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Гора Эльбрус</h2>
        <button class="card__like" type="button"></button>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image-3.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Домбай</h2>
        <button class="card__like" type="button"></button>
      </div>
    </div>
    <div class="card">
      <img src="images/card-image-1.png" alt="Карточка" class="card__image">
      <div class="card__description">
        <h2 class="card__title">Карачаево-черкесия</h2>
        <button class="card__like" type="button"></button>
      </div>
    </div>
  </section>
</main>
<footer class="footer">
  <p class="footer__copyright">© 2020 Mesto Russia</p>
</footer>

<!-- Модальное окно редактирования профиля -->
<div class="popup">
  <form action="#" class="popup__container">
    <button class="popup__close" type="button" aria-label="Закрыть"></button>
    <h2 class="popup__title">Редактировать профиль</h2>
    <input type="text" class="popup__input" value="Жак-Ив Кусто" name="name">
    <input type="text" class="popup__input" value="Исследователь океана" name="description">
    <button type="submit" class="popup__submit">Сохранить</button>
  </form>
</div>

</body>
</html>
